<!doctype html>
<!-- Arquivo HTML: publicar.html | Estrutura e conteúdo da página correspondente. -->
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetConecta - Cadastro de Pet</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/publicar.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    // Adicionando o script do Leaflet para mapas interativos
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="css/buttons-global.css" />
  </head>
  <body>
    <!-- Cabeçalho -->
    <header id="cabeca">
      <h1 id="logo">🐾 PetConecta</h1>
      <nav id="nav-menu">
        <button id="btn-mobile">Menu <span id="hamburguer"></span></button>
        <ul id="menu">
          <li><a href="index.html">Página Inicial</a></li>
          <li><a href="animais_encontra.html">Encontrados</a></li>
          <li><a href="adocao.html">Adoção</a></li>
          <li><a href="dicas.html">Dicas</a></li>
          <li><a href="contato.html">Contato</a></li>
        </ul>
      </nav>
    </header>

    <!-- Conteúdo principal -->
    <div class="cadastro-container">
      <h2>Cadastro de Pet</h2>

      <form id="form-container">
        <div>
          <label for="nome">Nome do pet:</label>
          <input type="text" id="nome" name="nome" required />
        </div>

        <div>
          <label for="localizacao">Última localização vista:</label>
          <input
            type="text"
            id="localizacao"
            name="localizacao"
            placeholder="Digite o endereço ou clique no mapa..."
            required
          />
          <div id="map" style="height: 300px; border-radius: 8px; margin-top: 10px; border: 1px solid #ccc;"></div>
          <input type="hidden" id="lat" name="latitude" />
          <input type="hidden" id="lng" name="longitude" />
        </div>

        <div>
          <label for="tipo">Tipo de Animal:</label>
          <select id="tipo" name="tipo" required>
            <option value="cachorro">Cachorro</option>
            <option value="gato">Gato</option>
          </select>
        </div>

        <div>
          <label for="sexo">Sexo:</label>
          <select id="sexo" name="sexo" required>
            <option value="macho">Macho</option>
            <option value="fêmea">Fêmea</option>
            <option value="indefinido">Indefinido</option>
          </select>
        </div>

        <div>
          <label for="porte">Porte:</label>
          <select id="porte" name="porte" required>
            <option value="Pequeno">Pequeno</option>
            <option value="Médio">Médio</option>
            <option value="Grande">Grande</option>
          </select>
        </div>

        <div>
          <label for="idade">Idade estimada:</label>
          <input type="text" id="idade" name="idade" required />
        </div>

        <div>
          <label for="data">Data do desaparecimento:</label>
          <input type="date" id="data" name="data" required />
        </div>

        <div>
          <label for="contato">Contato (email):</label>
          <input type="email" id="contato" name="contato" required />
        </div>

        <div>
          <label for="whatsapp">WhatsApp:</label>
          <input type="text" id="whatsapp" name="whatsapp" />
        </div>

        <div>
          <label for="imagem">Imagem do pet:</label>
          <input
            type="file"
            id="imagem"
            name="imagem"
            accept="image/*"
            required
          />
          <!-- 🚀 ADICIONADO: Container de erro visual para a imagem -->
          <div id="erro-imagem" style="color: #ff3333; font-size: 14px; margin-top: 5px; font-weight: bold; display: none;"></div>
        </div>

        <div>
          <label for="descricao">Descrição:</label>
          <textarea id="descricao" name="descricao"></textarea>
        </div>

        <button type="submit">Cadastrar</button>
      </form>
    </div>

    <footer>
      <div style="max-width: 1000px; margin: auto">
        <h3>🐶 PetConecta</h3>
        <p>Conectando pets incríveis a lares amorosos 💕</p>
        <p style="font-size: 14px">© 2026 PetConecta. Todos os direitos reservados.</p>
      </div>
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
      import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
      import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
      import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-storage.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBpbc3GPkPHzN78cgXQsZWJ8ayzdiIdUYY",
        authDomain: "petconecta-db068.firebaseapp.com",
        projectId: "petconecta-db068",
        storageBucket: "petconecta-db068.firebasestorage.app",
        messagingSenderId: "1030110038715",
        appId: "1:1030110038715:web:151deca61831138159b79e"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      const storage = getStorage(app);

      let usuarioLogado = null;

      // Monitora o estado de Login
      onAuthStateChanged(auth, (user) => {
        const menu = document.getElementById("menu");
        if (!menu) return;

        const linksBase = `
          <li><a href="index.html">Página Inicial</a></li>
          <li><a href="animais_encontra.html">Encontrados</a></li>
          <li><a href="adocao.html">Adoção</a></li>
          <li><a href="dicas.html">Dicas</a></li>
          <li><a href="contato.html">Contato</a></li>
        `;

        if (user) {
          usuarioLogado = user;
          const nomeExibicao = user.displayName || user.email.split('@')[0];
          
          menu.innerHTML = `
            ${linksBase}
            <li><a href="cadastrados.html">Meus Pets</a></li>
            <li><span style="color: #ff914d; font-weight: bold; margin-left: 10px;">Olá, ${nomeExibicao}!</span></li>
            <li><a href="#" id="btn-logout" style="color: #ff3333; font-weight: bold; text-decoration: none;">Sair</a></li>
          `;

          const btnLogout = document.getElementById("btn-logout");
          if (btnLogout) {
            btnLogout.addEventListener("click", (e) => {
              e.preventDefault();
              signOut(auth).then(() => {
                localStorage.removeItem("usuarioLogado");
                window.location.reload();
              });
            });
          }
        } else {
          localStorage.setItem("destinoAposLogin", "publicar.html");
          alert("Você precisa estar logado para cadastrar um pet.");
          window.location.href = "criar-conta.html";
        }
      });

      // Menu responsivo mobile
      const btnMobile = document.querySelector("#btn-mobile");
      if (btnMobile) {
        btnMobile.addEventListener("click", () => {
          document.querySelector("#nav-menu").classList.toggle("active");
        });
      }

      // Mapa interativo (Leaflet)
      const map = L.map("map").setView([-14.235, -51.9253], 4);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
      }).addTo(map);

      let marker;
      const campoLocalizacao = document.getElementById("localizacao");
      
      if (campoLocalizacao) {
        campoLocalizacao.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            this.blur();
          }
        });

        campoLocalizacao.addEventListener("change", function () {
          const query = this.value.trim();
          if (!query) return;

          fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`)
            .then((res) => res.json())
            .then((data) => {
              if (data && data.length > 0) {
                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);
                const latlng = L.latLng(lat, lon);

                if (marker) {
                  marker.setLatLng(latlng);
                } else {
                  marker = L.marker(latlng).addTo(map);
                }
                map.setView(latlng, 15);

                document.getElementById("lat").value = lat;
                document.getElementById("lng").value = lon;
              }
            })
            .catch((err) => console.error("Erro na geocodificação:", err));
        });
      }

      map.on("click", function (e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;

        if (marker) {
          marker.setLatLng(e.latlng);
        } else {
          marker = L.marker(e.latlng).addTo(map);
        }

        document.getElementById("lat").value = lat;
        document.getElementById("lng").value = lng;

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("localizacao").value =
              data.display_name || `Lat: ${lat}, Lng: ${lng}`;
          });
      });

      // 🚀 ADICIONADO: Validação visual dinâmica no campo de upload de imagem
      const inputImagem = document.getElementById("imagem");
      const containerErro = document.getElementById("erro-imagem");

      if (inputImagem) {
        inputImagem.addEventListener("change", function () {
          const arquivo = this.files[0];
          containerErro.style.display = "none";
          containerErro.textContent = "";

          if (arquivo) {
            // Validação de tipo (MIME-Type deve ser imagem)
            if (!arquivo.type.startsWith("image/")) {
              containerErro.textContent = "Erro: O arquivo selecionado precisa ser uma imagem válida.";
              containerErro.style.display = "block";
              this.value = ""; // Limpa a seleção
              return;
            }

            // Validação de tamanho (5 MB = 5 * 1024 * 1024 bytes)
            const limiteTamanho = 5 * 1024 * 1024;
            if (arquivo.size > limiteTamanho) {
              containerErro.textContent = "Erro: A imagem excede o tamanho limite de 5MB. Escolha uma foto menor.";
              containerErro.style.display = "block";
              this.value = ""; // Limpa a seleção
            }
          }
        });
      }

      // Processamento e Cadastro
      const form = document.getElementById("form-container");
      if (form) {
        form.addEventListener("submit", async function (e) {
          e.preventDefault();

          if (!usuarioLogado) {
            alert("Erro: Você precisa estar autenticado para realizar esta ação.");
            return;
          }

          const pet = {
            nome: document.getElementById("nome").value.trim(),
            localiza: document.getElementById("localizacao").value.trim(),
            localizacao: document.getElementById("localizacao").value.trim(),
            raca: document.getElementById("tipo").value,
            tipo: document.getElementById("tipo").value,
            sexo: document.getElementById("sexo").value,
            porte: document.getElementById("porte").value,
            idade: document.getElementById("idade").value.trim(),
            data: document.getElementById("data").value,
            contato: document.getElementById("contato").value.trim(),
            whatsapp: document.getElementById("whatsapp").value.trim(),
            descricao: document.getElementById("descricao").value.trim(),
            lat: parseFloat(document.getElementById("lat").value) || null,
            lng: parseFloat(document.getElementById("lng").value) || null,
            status: "desaparecido",
            usuarioCriador: usuarioLogado.email
          };

          const imagemInput = document.getElementById("imagem").files[0];

          try {
            if (imagemInput) {
              // Upload seguro direto ao Storage
              const nomeArquivo = `${Date.now()}_${imagemInput.name}`;
              const storageRef = ref(storage, `pets/${nomeArquivo}`);

              console.log("Iniciando upload da imagem...");
              const snapshot = await uploadBytes(storageRef, imagemInput);
              const downloadURL = await getDownloadURL(snapshot.ref);
              
              pet.imagem = downloadURL; // Salva o link encurtado no objeto do pet
            } else {
              pet.imagem = "";
            }

            await salvarPet(pet);

          } catch (error) {
            console.error("Erro no processamento de envio e cadastro:", error);
            alert("Houve um erro ao processar o cadastro do pet ou upload da foto.");
          }
        });
      }

      async function salvarPet(pet) {
        try {
          await addDoc(collection(db, "pets"), pet);
          alert(`Pet cadastrado com sucesso!`);
          window.location.href = "index.html"; 
        } catch (error) {
          console.error("Erro ao salvar no Firestore: ", error);
          alert("Ocorreu um erro ao salvar o pet. Verifique as regras ou inicialização do banco.");
        }
      }
    </script>
  </body>
</html>
