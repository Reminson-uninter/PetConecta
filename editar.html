<!DOCTYPE html>
<!-- Arquivo HTML: editar.html | Estrutura e conteúdo da página correspondente. -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Editar Pet - PetFinder</title>
  <link rel="stylesheet" href="css/editar-pet.css">
  <link rel="stylesheet" href="css/buttons-global.css" />
</head>
<body>
  <header>
    <h1>🐾 PetConecta</h1>
  </header>

  <main>
    <section class="formulario">
      <h2>Editar Dados do Pet</h2>
      <form id="form-edicao">
        <div>
          <label for="nome">Nome do pet:</label>
          <input type="text" id="nome" name="nome" required>
        </div>

        <div>
          <label for="localizacao">Última localização vista:</label>
          <input type="text" id="localizacao" name="localizacao" placeholder="Ex: Rua das flores, Bairro Rio Jardim..." required>
        </div>

        <div>
          <label for="tipo">Tipo de Animal:</label>
          <select id="tipo" name="tipo">
            <option value="cachorro">Cachorro</option>
            <option value="gato">Gato</option>
          </select>
        </div>
        
        <div>
          <label for="sexo">Sexo:</label>
          <select id="sexo" name="sexo" required>
            <option value="macho">Macho</option>
            <option value="fêmea">Fêmea</option>
            <option value="indefinido">Indefinido</option>
          </select>
        </div>

        <div>
          <label for="idade">Idade estimada:</label>
          <input type="text" id="idade" name="idade" placeholder="Ex: 1 ano e 3 meses" required>
        </div>

        <div>
          <label for="data">Data do desaparecimento:</label>
          <input type="date" id="data" name="data" required>
        </div>

        <div>
          <label for="contato">Contato (E-mail):</label>
          <input type="email" id="contato" name="contato" placeholder="Ex: seuemail@exemplo.com" required>
        </div>

        <div>
          <label for="whatsapp">WhatsApp:</label>
          <input type="text" id="whatsapp" name="whatsapp" placeholder="Ex: 7399847372">
        </div>

        <div>
          <label for="imagem">Imagem do pet:</label>
          <input type="file" id="imagem" name="imagem" accept="image/*">
          <img id="preview-imagem" src="" alt="Imagem atual do pet" style="max-width: 200px; margin-top: 10px; display: block; border-radius: 8px;">
        </div>

        <div>
          <label for="descricao">Descrição do pet (opcional):</label>
          <textarea id="descricao" name="descricao" placeholder="Ex: cor, pequeno, assustado, coleira azul..."></textarea>
        </div>
 
        <div class="botoes">
          <button type="submit">Salvar Alterações</button>
          <button type="button" id="cancelar-btn">Cancelar</button>
        </div>
      </form>
    </section>
  </main>

  <footer>
    <div style="max-width: 1000px; margin: auto;">
      <h3 style="margin-bottom: 10px;">🐶 PetConecta</h3>
      <p style="margin-bottom: 20px;">Conectando pets incríveis a lares amorosos 💕</p>

      <div style="margin-bottom: 20px;">
        <a href="https://www.instagram.com/seuusuario" target="_blank" style="margin: 0 15px;">
          <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram" width="32" height="32">
        </a>
        <a href="https://www.facebook.com/seuusuario" target="_blank" style="margin: 0 15px;">
          <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook" width="32" height="32">
        </a>
      </div>

      <nav style="margin-bottom: 15px;">
        <a href="index.html" style="color: white; margin: 0 10px; text-decoration: none;">Página Inicial</a> |
        <a href="adocao.html" style="color: white; margin: 0 10px; text-decoration: none;">Adoção</a> |
        <a href="dicas.html" style="color: white; margin: 0 10px; text-decoration: none;">Cuidados</a> |
        <a href="contato.html" style="color: white; margin: 0 10px; text-decoration: none;">Contato</a>
      </nav>

      <p style="font-size: 14px;">© 2026 PetConecta. Todos os direitos reservados.</p>
    </div>
  </footer>

  <!-- Script Modular Integrado com o Firebase -->
  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-storage.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

    // Configuração do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBpbc3GPkPHzN78cgXQsZWJ8ayzdiIdUYY",
      authDomain: "petconecta-db068.firebaseapp.com",
      projectId: "petconecta-db068",
      storageBucket: "petconecta-db068.firebasestorage.app",
      messagingSenderId: "1030110038715",
      appId: "1:1030110038715:web:151deca61831138159b79e"
    };

    // Inicialização Blindada
    const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
    const db = getFirestore(app);
    const storage = getStorage(app);
    const auth = getAuth(app);

    let usuarioLogado = null;
    let urlImagemAtual = "";

    // 📦 Recupera o ID da URL ou do localStorage para flexibilidade
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id") || localStorage.getItem("petEditId");

    if (!id) {
      alert("ID de edição inválido ou não informado.");
      window.location.href = "cadastrados.html";
    }

    // Monitora o login e executa o carregamento dos dados do pet
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        usuarioLogado = user;
        await carregarDadosPet();
      } else {
        alert("Sua sessão expirou. Faça login novamente para prosseguir.");
        window.location.href = "criar-conta.html";
      }
    });

    // 🚀 ADICIONADO: Função para recuperar os dados reais do Firestore
    async function carregarDadosPet() {
      try {
        const docRef = doc(db, "pets", id);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const pet = docSnap.data();

          // Segurança: Apenas o criador pode editar as próprias publicações
          if (pet.usuarioCriador && usuarioLogado.email.toLowerCase() !== pet.usuarioCriador.toLowerCase()) {
            alert("Ação não autorizada. Você só pode editar as suas próprias publicações.");
            window.location.href = "cadastrados.html";
            return;
          }

          // Preenche as informações no formulário do HTML
          document.getElementById("nome").value = pet.nome || "";
          document.getElementById("localizacao").value = pet.localizacao || pet.localiza || "";
          document.getElementById("tipo").value = pet.tipo || pet.raca || "cachorro";
          document.getElementById("sexo").value = pet.sexo || "macho";
          document.getElementById("idade").value = pet.idade || "";
          document.getElementById("data").value = pet.data || "";
          document.getElementById("contato").value = pet.contato || "";
          document.getElementById("whatsapp").value = pet.whatsapp || "";
          document.getElementById("descricao").value = pet.descricao || "";
          
          urlImagemAtual = pet.imagem || "";
          document.getElementById("preview-imagem").src = urlImagemAtual || "https://via.placeholder.com/150";

        } else {
          alert("O pet solicitado não existe ou foi excluído.");
          window.location.href = "index.html";
        }
      } catch (error) {
        console.error("Erro ao carregar dados do pet no Firestore:", error);
        alert("Erro ao buscar as informações do pet.");
      }
    }

    // Retorno do botão de cancelar edição
    document.getElementById("cancelar-btn").addEventListener("click", function () {
      if (confirm("Deseja cancelar a edição e voltar sem salvar?")) {
        window.location.href = "index.html";
      }
    });

    // Visualização da imagem escolhida em tempo real
    document.getElementById("imagem").addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          document.getElementById("preview-imagem").src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // 💾 Salvamento das alterações e validações integradas
    document.getElementById("form-edicao").addEventListener("submit", async function (e) {
      e.preventDefault();
      removerErros();

      // Coleta dados estruturados
      const petAtualizado = {
        nome: document.getElementById("nome").value.trim(),
        localiza: document.getElementById("localizacao").value.trim(),
        localizacao: document.getElementById("localizacao").value.trim(),
        raca: document.getElementById("tipo").value,
        tipo: document.getElementById("tipo").value,
        sexo: document.getElementById("sexo").value,
        idade: document.getElementById("idade").value.trim(),
        data: document.getElementById("data").value,
        contato: document.getElementById("contato").value.trim(),
        whatsapp: document.getElementById("whatsapp").value.trim(),
        descricao: document.getElementById("descricao").value.trim(),
        usuarioCriador: usuarioLogado.email
      };

      let valido = true;

      // Validação dos campos obrigatórios
      const camposObrigatorios = ["nome", "localiza", "idade", "data", "contato"];
      camposObrigatorios.forEach(campo => {
        const valor = petAtualizado[campo];
        if (!valor) {
          const input = document.getElementById(campo === "localiza" ? "localizacao" : campo);
          mostrarErro(input, "Campo obrigatório.");
          valido = false;
        }
      });

      // Validação do contato como e-mail
      const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(petAtualizado.contato);
      if (!emailValido) {
        mostrarErro(document.getElementById("contato"), "Insira um e-mail válido.");
        valido = false;
      }

      // Validação do WhatsApp se estiver preenchido
   if (petAtualizado.whatsapp) {
  // Remove tudo que não for dígito
  const apenasNumeros = petAtualizado.whatsapp.replace(/\D/g, "");

  const whatsappValido = /^\d{10,13}$/.test(apenasNumeros);
  
  if (!whatsappValido) {
    mostrarErro(
      document.getElementById("whatsapp"),
      "Informe um número válido com 10 a 13 dígitos (ex: (73) 99124-3772 ou 73991243772)."
    );
    valido = false;
  }
}



      // Validação de data no futuro
      const dataFormatada = new Date(petAtualizado.data);
      const hoje = new Date();
      if (dataFormatada > hoje) {
        mostrarErro(document.getElementById("data"), "A data não pode ser no futuro.");
        valido = false;
      }

      if (!valido) return;

      if (!confirm("Deseja realmente salvar todas as alterações?")) return;

      try {
        let linkImagemFinal = urlImagemAtual;
        const imagemInput = document.getElementById("imagem");
        const novaImagem = imagemInput.files[0];

        if (novaImagem) {
          console.log("Realizando upload da nova foto para o Cloud Storage...");
          const nomeArquivo = `${Date.now()}_${novaImagem.name}`;
          const storageReference = storageRef(storage, `pets/${nomeArquivo}`);
          const snapshot = await uploadBytes(storageReference, novaImagem);
          linkImagemFinal = await getDownloadURL(snapshot.ref);
        }

        petAtualizado.imagem = linkImagemFinal;

        // Atualização dos dados no Firestore
        console.log("Atualizando registro do Firestore...");
        await updateDoc(doc(db, "pets", id), petAtualizado);

        alert("Pet atualizado com sucesso!");
        window.location.href = "index.html";

      } catch (error) {
        console.error("Erro ao salvar dados no Firebase:", error);
        alert("Ocorreu um erro ao atualizar os dados. Verifique sua conexão.");
      }
    });

    // Funções auxiliares de validação visual
    function mostrarErro(input, mensagem) {
      const erro = document.createElement("small");
      erro.classList.add("erro");
      erro.style.color = "red";
      erro.style.fontWeight = "bold";
      erro.style.display = "block";
      erro.textContent = mensagem;
      input.insertAdjacentElement("afterend", erro);
    }

    function removerErros() {
      document.querySelectorAll(".erro").forEach(el => el.remove());
    }
  </script>
</body>
</html>
